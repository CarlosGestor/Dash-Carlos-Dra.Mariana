<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Consultório</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f9;--card:#fff;--border:#e8ecf2;
  --fg:#1a2035;--muted:#6b7a99;--muted2:#9aa3b8;
  --primary:#214a4c;--primary-a:rgba(33,74,76,.1);
  --green:#059669;--green-a:rgba(5,150,105,.12);
  --red:#dc2626;--red-a:rgba(220,38,38,.12);
  --amber:#d97706;--amber-a:rgba(217,119,6,.14);
  --blue:#2563eb;--blue-a:rgba(37,99,235,.12);
  --r:10px;--shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;min-height:100vh}

.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.hdr-left{display:flex;align-items:center;gap:16px;min-width:0}
.logo-wrap{display:flex;align-items:center;gap:8px;padding-right:16px;border-right:1px solid var(--border)}
.logo-icon{width:30px;height:30px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name{font-size:.8rem;font-weight:700;color:var(--primary);letter-spacing:.3px;white-space:nowrap}
.hdr h1{font-size:.95rem;font-weight:600;letter-spacing:-.2px}
.hdr-sub{font-size:.7rem;color:var(--muted);margin-top:1px}
.badge-upd{font-size:.68rem;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap}

.fbar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:46px}
.flbl{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);white-space:nowrap;margin-right:2px}
.pill{padding:4px 13px;border-radius:20px;font-size:.74rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--primary);color:var(--primary)}
.pill.active{background:var(--primary);border-color:var(--primary);color:#fff}
.tab-group{display:flex;gap:2px;background:#eef0f5;border-radius:8px;padding:3px;margin-left:auto}
.tab-btn{padding:5px 18px;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--card);color:var(--primary);box-shadow:var(--shadow)}

.main{padding:20px 28px;max-width:1280px;margin:0 auto}

.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.kc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;box-shadow:var(--shadow);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;min-width:0}
.klbl{font-size:.61rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
.kval{font-size:1.7rem;font-weight:700;letter-spacing:-.5px;line-height:1}
.ksub{font-size:.67rem;color:var(--muted2);margin-top:6px;line-height:1.35}
.kico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;font-weight:700}
.kb{background:var(--primary-a);color:var(--primary)}.kt{background:var(--green-a);color:var(--green)}.ko{background:var(--blue-a);color:var(--blue)}.kp{background:var(--amber-a);color:var(--amber)}

.row{display:grid;gap:12px;margin-bottom:12px}
.c2{grid-template-columns:1fr 1fr}.c1{grid-template-columns:1fr}
.cc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);min-width:0;max-width:100%;overflow:hidden}
.cct{font-size:.85rem;font-weight:600}
.ccs{font-size:.68rem;color:var(--muted2);margin-top:2px;margin-bottom:12px}
.cw{position:relative}.h210{height:210px}.h260{height:260px}
.tsec{display:none}.tsec.active{display:block}
.empty{color:var(--muted2);font-size:.78rem;text-align:center;padding:40px 10px}

/* FUNIL — barras maiores, pequenos bem visíveis */
.funnel{display:flex;flex-direction:column;gap:14px;padding:6px 0 2px}
.fr{display:flex;align-items:center;gap:12px}
.fn{width:132px;font-size:.74rem;color:var(--muted);text-align:right;flex-shrink:0;font-weight:600}
.ft{flex:1;height:44px;background:#eef1f5;border-radius:8px;overflow:hidden;min-width:0}
.ff{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:14px;font-size:1rem;font-weight:700;color:#fff;transition:width .6s ease;white-space:nowrap}
.fc{width:50px;font-size:1rem;font-weight:700;text-align:right;font-family:'DM Mono',monospace;flex-shrink:0}
.fconv{font-size:.7rem;color:var(--muted2);margin-top:14px;text-align:center}

/* LISTA PROC */
.plist{display:flex;flex-direction:column;gap:8px}
.pcard{border:1px solid var(--border);border-radius:8px;padding:11px 13px;background:#fcfdfe}
.pcard-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.pname{font-size:.79rem;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pmot{font-size:.73rem;color:var(--muted);line-height:1.45}
.pmes{font-size:.62rem;color:var(--muted2);font-family:'DM Mono',monospace;margin-top:3px}
.bdg{display:inline-block;padding:3px 10px;border-radius:5px;font-size:.65rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.bdg-g{background:var(--green-a);color:#047857}.bdg-b{background:var(--primary-a);color:#214a4c}
.bdg-o{background:var(--amber-a);color:#b45309}.bdg-r{background:var(--red-a);color:#b91c1c}
.pfilter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.pf{padding:4px 11px;border-radius:14px;font-size:.69rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit}
.pf.active{background:var(--primary);border-color:var(--primary);color:#fff}

.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:80px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fff5f5;border:1px solid #fecaca;border-radius:var(--r);padding:24px 32px;text-align:center;max-width:480px;margin:60px auto}
.error-box h3{color:var(--red);font-size:.95rem;margin-bottom:8px}
.error-box code{font-family:'DM Mono',monospace;font-size:.78rem;background:#fee2e2;padding:2px 6px;border-radius:4px;color:#991b1b}

@media(max-width:1100px){.kg{grid-template-columns:repeat(2,1fr)}.c2{grid-template-columns:1fr}}
@media(max-width:680px){
  .hdr{height:auto;min-height:52px;padding:8px 14px;flex-wrap:wrap;gap:6px;row-gap:4px}
  .hdr-left{gap:10px;flex:1;min-width:0}.logo-wrap{padding-right:10px;gap:6px}
  .hdr h1{font-size:.85rem}.hdr-sub{font-size:.64rem}
  .fbar{padding:8px 14px}.main{padding:14px}
  .tab-group{margin-left:0;width:100%}.tab-btn{flex:1;text-align:center}
  .kg{grid-template-columns:1fr 1fr;gap:10px}.kval{font-size:1.4rem}.kico{display:none}
  .cc{padding:14px}.fn{width:104px;font-size:.68rem}.ft{height:38px}.ff{font-size:.85rem}
  .c2,.row{min-width:0}
}
@media(max-width:380px){.kg{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="logo-wrap">
      <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg></div>
      <span class="logo-name">Carlos.Gestor</span>
    </div>
    <div>
      <h1 id="titulo-clinica">Dashboard Consultório</h1>
      <div class="hdr-sub" id="subtitulo">Consultório Aurora</div>
    </div>
  </div>
  <div class="hdr-right"><span class="badge-upd" id="badge-upd">—</span></div>
</header>

<div class="fbar" id="fbar" style="display:none">
  <span class="flbl">Mês</span>
  <div id="mespills" style="display:flex;gap:8px;flex-wrap:wrap"></div>
  <div class="tab-group" id="tabgroup">
    <button class="tab-btn active" data-t="geral">Geral</button>
    <button class="tab-btn" data-t="motivos">Motivos</button>
  </div>
</div>

<main class="main" id="main"><div class="spinner"></div></main>

<script>
const CONFIG={clinicaNome:'Dashboard Consultório'};
let DB=null, mesAtivo='todos', abaAtiva='geral', procFiltro='todos', charts={};
const MES_NOME={'2026-03':'Março','2026-04':'Abril','2026-05':'Maio','2026-06':'Junho'};
const PAL=['#214a4c','#2563eb','#d97706','#7c3aed','#dc2626','#0891b2'];
const PROC_COL={'Ganho':'#059669','Em Aberto':'#214a4c','Atenção':'#d97706','Perdido':'#dc2626'};
const BDG={'Ganho':'bdg-g','Em Aberto':'bdg-b','Atenção':'bdg-o','Perdido':'bdg-r'};
const pct=(a,b)=>(a==null||b==null||b===0)?'—':Math.round(a/b*100)+'%';

async function init(){
  try{ const r=await fetch('data.json?t='+Date.now()); if(!r.ok) throw 0; DB=await r.json(); }
  catch(e){ document.getElementById('main').innerHTML='<div class="error-box"><h3>Não consegui carregar o data.json</h3><p>Confirme que <code>data.json</code> está na mesma pasta do <code>index.html</code>.</p></div>'; return; }
  document.getElementById('titulo-clinica').textContent=DB.clinica||CONFIG.clinicaNome;
  document.getElementById('subtitulo').textContent=DB.subtitulo||'';
  document.title=DB.clinica||CONFIG.clinicaNome;
  document.getElementById('badge-upd').textContent='Atualizado '+(DB.ultimaAtualizacao||'');
  buildPills(); buildTabs(); render();
}
function buildPills(){
  document.getElementById('fbar').style.display='flex';
  const wrap=document.getElementById('mespills');
  const pills=[['todos','Todos']].concat(DB.meses.map(m=>[m,DB.mesesLabel[m]||m]));
  wrap.innerHTML=pills.map(([k,l])=>`<button class="pill ${k===mesAtivo?'active':''}" data-m="${k}">${l}</button>`).join('');
  wrap.querySelectorAll('.pill').forEach(b=>b.onclick=()=>{mesAtivo=b.dataset.m;buildPills();render();});
}
function buildTabs(){
  document.querySelectorAll('#tabgroup .tab-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.t===abaAtiva);
    b.onclick=()=>{abaAtiva=b.dataset.t;buildTabs();render();};
  });
}
function funilData(){ return mesAtivo==='todos' ? {...DB.totais,label:'Todos os meses (Mar–Jun)'} : {...DB.funil[mesAtivo],label:MES_NOME[mesAtivo]+'/2026'}; }
function procStatusFor(){ if(mesAtivo==='todos') return DB.procStatus; const it=DB.procLista.filter(p=>p.mkey===mesAtivo); if(!it.length) return null; const c={};it.forEach(p=>c[p.status]=(c[p.status]||0)+1);return c; }
function motivosFor(){ return mesAtivo==='todos' ? DB.perdidosMotivo : (DB.perdidosMotivoMes[mesAtivo]||null); }

function render(){
  const f=funilData(), main=document.getElementById('main');
  const mesTxt = mesAtivo==='todos' ? 'Mar–Jun' : (MES_NOME[mesAtivo]+'/2026');
  main.innerHTML=`
  <!-- ===== GERAL ===== -->
  <section class="tsec ${abaAtiva==='geral'?'active':''}">
    <div class="kg">
      <div class="kc"><div><div class="klbl">Leads que entram</div><div class="kval" style="color:var(--primary)">${f.entram??'—'}</div><div class="ksub">novos contatos · ${mesTxt}<br><span>inclui spam/parceiros</span></div></div><div class="kico kb">↘</div></div>
      <div class="kc"><div><div class="klbl">Fecham consulta</div><div class="kval" style="color:var(--green)">${f.novas??'—'}</div><div class="ksub">consultas novas (TTO)<br>${pct(f.novas,f.entram)} dos leads</div></div><div class="kico kt">✓</div></div>
      <div class="kc"><div><div class="klbl">Enviados à Meire</div><div class="kval" style="color:var(--blue)">${f.enviados??'—'}</div><div class="ksub">casos de procedimento<br>${pct(f.enviados,f.novas)} das novas</div></div><div class="kico ko">→</div></div>
      <div class="kc"><div><div class="klbl">Fecham procedimento</div><div class="kval" style="color:var(--amber)">${f.fecha??'—'}</div><div class="ksub">"Ganho" com a Meire<br>${pct(f.fecha,f.enviados)} dos enviados</div></div><div class="kico kp">★</div></div>
    </div>

    <div class="row c2">
      <div class="cc">
        <div class="cct">Funil do período</div><div class="ccs">${f.label}</div>
        <div class="funnel" id="funnel"></div>
        <div class="fconv" id="fconv"></div>
      </div>
      <div class="cc">
        <div class="cct">Por que não fechou consulta</div><div class="ccs">Motivo de perda · ${mesTxt}</div>
        <div class="cw h260" id="wrap-mot"><canvas id="c-mot"></canvas></div>
      </div>
    </div>

    <div class="row c2">
      <div class="cc">
        <div class="cct">Leads perdidos por mês</div><div class="ccs">Pela data de criação do lead</div>
        <div class="cw h210"><canvas id="c-perd"></canvas></div>
      </div>
      <div class="cc">
        <div class="cct">Procedimentos - Status</div><div class="ccs">Situação dos casos enviados à Meire · ${mesTxt}</div>
        <div class="cw h260" id="wrap-proc"><canvas id="c-proc"></canvas></div>
      </div>
    </div>
  </section>

  <!-- ===== MOTIVOS ===== -->
  <section class="tsec ${abaAtiva==='motivos'?'active':''}">
    <div class="row c1">
      <div class="cc">
        <div class="cct">Motivos da consulta — por que não fechou</div><div class="ccs">Quantidade por motivo · ${mesTxt}</div>
        <div class="cw h260" id="wrap-motbar"><canvas id="c-motbar"></canvas></div>
      </div>
    </div>
    <div class="row c1"><div class="cc">
      <div class="cct">Lista de Procedimento e motivos</div>
      <div class="ccs">O que está travando cada caso enviado à Meire · ${mesTxt}</div>
      <div class="pfilter" id="pfilter"></div>
      <div class="plist" id="plist"></div>
    </div></div>
  </section>`;

  if(abaAtiva==='geral'){ drawFunnel(f); drawConsultaDonut(); drawPerdidos(); drawProcDonut(); }
  if(abaAtiva==='motivos'){ drawMotivosBar(); drawProcList(); }
}

function destroy(id){ if(charts[id]){charts[id].destroy();delete charts[id];} }

function drawFunnel(f){
  const stages=[['Entram',f.entram,'var(--primary)'],['Fecham consulta',f.novas,'var(--green)'],['Enviados à Meire',f.enviados,'var(--blue)'],['Fecham procedimento',f.fecha,'var(--amber)']];
  const base=stages.map(s=>s[1]).filter(v=>v!=null&&v>0); const max=base.length?Math.max(...base):1;
  // piso de 22% pra os valores pequenos ficarem bem visíveis
  document.getElementById('funnel').innerHTML=stages.map(([n,v,c])=>{
    const w=(v==null)?0:Math.round(22+(v/max)*78);
    return `<div class="fr"><div class="fn">${n}</div><div class="ft"><div class="ff" style="width:${w}%;background:${c}">${v==null?'':v}</div></div><div class="fc">${v==null?'—':v}</div></div>`;
  }).join('');
  let conv='';
  if(f.entram&&f.novas) conv+=`Lead→consulta ${pct(f.novas,f.entram)} · `;
  if(f.novas&&f.enviados) conv+=`consulta→Meire ${pct(f.enviados,f.novas)} · `;
  if(f.enviados&&f.fecha!=null) conv+=`Meire→fecha ${pct(f.fecha,f.enviados)}`;
  document.getElementById('fconv').textContent=conv.replace(/ · $/,'')||'Sem dados suficientes neste mês para o funil completo.';
}

// Leads perdidos por mês — fixo, igual estava (não muda com filtro)
function drawPerdidos(){
  destroy('perd');
  const labels=DB.meses.map(m=>DB.mesesLabel[m]||m);
  const data=DB.meses.map(m=>DB.perdidosMes[m]??0);
  charts['perd']=new Chart(document.getElementById('c-perd'),{type:'bar',
    data:{labels,datasets:[{data,backgroundColor:'#214a4c',borderRadius:6,maxBarThickness:60}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw} leads perdidos`}}},
    scales:{y:{beginAtZero:true,grid:{color:'#f0f2f6'},ticks:{font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:11}}}}}});
}

// Donut — Por que não fechou consulta (atualiza com filtro)
function drawConsultaDonut(){
  destroy('mot'); const e=motivosFor();
  if(!e){document.getElementById('wrap-mot').innerHTML='<div class="empty">Sem perdas registradas neste mês.</div>';return;}
  const labels=Object.keys(e),data=Object.values(e),tot=data.reduce((a,b)=>a+b,0);
  charts['mot']=new Chart(document.getElementById('c-mot'),{type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:PAL,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{position:'right',labels:{boxWidth:11,font:{size:11},padding:8}},
      tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw} (${Math.round(c.raw/tot*100)}%)`}}}}});
}

// Donut — Procedimentos - Status (atualiza com filtro)
function drawProcDonut(){
  destroy('proc'); const s=procStatusFor();
  if(!s){document.getElementById('wrap-proc').innerHTML='<div class="empty">Sem dados de procedimentos neste mês.<br><span style="font-size:.7rem">(Planilha da Meire vai até maio)</span></div>';return;}
  const order=['Ganho','Em Aberto','Atenção','Perdido'].filter(k=>s[k]!=null);
  charts['proc']=new Chart(document.getElementById('c-proc'),{type:'doughnut',
    data:{labels:order,datasets:[{data:order.map(k=>s[k]),backgroundColor:order.map(k=>PROC_COL[k]),borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{position:'right',labels:{boxWidth:11,font:{size:11},padding:10}}}}});
}

// Aba Motivos — barra VERTICAL dos motivos da consulta (atualiza com filtro)
function drawMotivosBar(){
  destroy('motbar'); const e=motivosFor();
  if(!e){document.getElementById('wrap-motbar').innerHTML='<div class="empty">Sem perdas registradas neste mês.</div>';return;}
  const labels=Object.keys(e),data=Object.values(e);
  charts['motbar']=new Chart(document.getElementById('c-motbar'),{type:'bar',
    data:{labels,datasets:[{data,backgroundColor:labels.map((_,i)=>PAL[i%PAL.length]),borderRadius:6,maxBarThickness:64}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw} perdas`}}},
    scales:{y:{beginAtZero:true,grid:{color:'#f0f2f6'},ticks:{font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
}

// Aba Motivos — lista de procedimentos (mês + status)
function drawProcList(){
  const inMes=DB.procLista.filter(p=>mesAtivo==='todos'||p.mkey===mesAtivo);
  const counts={todos:inMes.length}; inMes.forEach(p=>counts[p.status]=(counts[p.status]||0)+1);
  const opts=[['todos','Todos']].concat(['Em Aberto','Atenção','Perdido','Ganho'].map(s=>[s,s]));
  document.getElementById('pfilter').innerHTML=opts.map(([k,l])=>`<button class="pf ${k===procFiltro?'active':''}" data-s="${k}">${l} (${counts[k]||0})</button>`).join('');
  document.querySelectorAll('#pfilter .pf').forEach(b=>b.onclick=()=>{procFiltro=b.dataset.s;drawProcList();});
  const list=inMes.filter(p=>procFiltro==='todos'||p.status===procFiltro);
  document.getElementById('plist').innerHTML=list.map(p=>`
    <div class="pcard"><div class="pcard-top"><span class="pname">${p.nome}</span><span class="bdg ${BDG[p.status]||'bdg-b'}">${p.status}</span></div>
    <div class="pmot">${p.motivo}</div><div class="pmes">${p.mes}/2026</div></div>`).join('')
    || '<div class="empty">Nenhum caso neste filtro.</div>';
}
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Dra. Mariana (Six Fértile)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f9;--card:#fff;--border:#e8ecf2;
  --fg:#1a2035;--muted:#6b7a99;--muted2:#9aa3b8;
  --primary:#214a4c;--primary-a:rgba(33,74,76,.1);
  --green:#059669;--green-a:rgba(5,150,105,.12);
  --red:#dc2626;--red-a:rgba(220,38,38,.12);
  --amber:#d97706;--amber-a:rgba(217,119,6,.14);
  --blue:#2563eb;--blue-a:rgba(37,99,235,.12);
  --r:10px;--shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;min-height:100vh}

.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.hdr-left{display:flex;align-items:center;gap:16px;min-width:0}
.logo-wrap{display:flex;align-items:center;gap:8px;padding-right:16px;border-right:1px solid var(--border)}
.logo-icon{width:30px;height:30px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name{font-size:.8rem;font-weight:700;color:var(--primary);letter-spacing:.3px;white-space:nowrap}
.hdr h1{font-size:.95rem;font-weight:600;letter-spacing:-.2px}
.hdr-sub{font-size:.7rem;color:var(--muted);margin-top:1px}
.badge-upd{font-size:.68rem;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap}

.fbar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:46px}
.flbl{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);white-space:nowrap;margin-right:2px}
.pill{padding:4px 13px;border-radius:20px;font-size:.74rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--primary);color:var(--primary)}
.pill.active{background:var(--primary);border-color:var(--primary);color:#fff}

.main{padding:20px 28px;max-width:1280px;margin:0 auto}
.note{background:#fffaf0;border:1px solid #fde9c8;color:#92600a;font-size:.72rem;border-radius:8px;padding:9px 13px;margin-bottom:16px;line-height:1.5}
.note b{font-weight:600}

.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.kc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;box-shadow:var(--shadow);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;min-width:0}
.klbl{font-size:.61rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
.kval{font-size:1.7rem;font-weight:700;letter-spacing:-.5px;line-height:1}
.ksub{font-size:.67rem;color:var(--muted2);margin-top:6px;line-height:1.35}
.kico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;font-weight:700}
.kb{background:var(--primary-a);color:var(--primary)}.kt{background:var(--green-a);color:var(--green)}.ko{background:var(--blue-a);color:var(--blue)}.kp{background:var(--amber-a);color:var(--amber)}

.row{display:grid;gap:12px;margin-bottom:12px}
.c2{grid-template-columns:1fr 1fr}.c1{grid-template-columns:1fr}
.cc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);min-width:0;max-width:100%;overflow:hidden}
.cct{font-size:.85rem;font-weight:600}
.ccs{font-size:.68rem;color:var(--muted2);margin-top:2px;margin-bottom:12px}
.cw{position:relative}.h210{height:210px}.h240{height:240px}

/* FUNIL */
.funnel{display:flex;flex-direction:column;gap:11px;padding:4px 0 2px}
.fr{display:flex;align-items:center;gap:10px}
.fn{width:128px;font-size:.72rem;color:var(--muted);text-align:right;flex-shrink:0;font-weight:500}
.ft{flex:1;height:30px;background:#f0f2f6;border-radius:6px;overflow:hidden;min-width:0}
.ff{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:11px;font-size:.72rem;font-weight:700;color:#fff;transition:width .6s ease;white-space:nowrap}
.fc{width:46px;font-size:.82rem;font-weight:700;text-align:right;font-family:'DM Mono',monospace;flex-shrink:0}
.fconv{font-size:.67rem;color:var(--muted2);margin-top:10px;text-align:center}

/* PROC LIST */
.plist{display:flex;flex-direction:column;gap:8px;max-height:430px;overflow-y:auto}
.pcard{border:1px solid var(--border);border-radius:8px;padding:10px 12px;background:#fcfdfe}
.pcard-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.pname{font-size:.77rem;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pmot{font-size:.71rem;color:var(--muted);line-height:1.4}
.pmes{font-size:.62rem;color:var(--muted2);font-family:'DM Mono',monospace;margin-top:3px}
.bdg{display:inline-block;padding:2px 9px;border-radius:5px;font-size:.64rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.bdg-g{background:var(--green-a);color:#047857}
.bdg-b{background:var(--primary-a);color:#214a4c}
.bdg-o{background:var(--amber-a);color:#b45309}
.bdg-r{background:var(--red-a);color:#b91c1c}
.pfilter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
.pf{padding:3px 10px;border-radius:14px;font-size:.68rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit}
.pf.active{background:var(--primary);border-color:var(--primary);color:#fff}

.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fff5f5;border:1px solid #fecaca;border-radius:var(--r);padding:24px 32px;text-align:center;max-width:480px;margin:60px auto}
.error-box h3{color:var(--red);font-size:.95rem;margin-bottom:8px}
.error-box code{font-family:'DM Mono',monospace;font-size:.78rem;background:#fee2e2;padding:2px 6px;border-radius:4px;color:#991b1b}

@media(max-width:1100px){.kg{grid-template-columns:repeat(2,1fr)}.c2{grid-template-columns:1fr}}
@media(max-width:680px){
  .hdr{height:auto;min-height:52px;padding:8px 14px;flex-wrap:wrap;gap:6px;row-gap:4px}
  .hdr-left{gap:10px;flex:1;min-width:0}.logo-wrap{padding-right:10px;gap:6px}
  .hdr h1{font-size:.85rem}.hdr-sub{font-size:.64rem}
  .fbar{padding:8px 14px}.main{padding:14px}
  .kg{grid-template-columns:1fr 1fr;gap:10px}.kval{font-size:1.4rem}.kico{display:none}
  .cc{padding:14px}.fn{width:96px;font-size:.66rem}
  .c2,.row{min-width:0}
}
@media(max-width:380px){.kg{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="logo-wrap">
      <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg></div>
      <span class="logo-name">Carlos.Gestor</span>
    </div>
    <div>
      <h1 id="titulo-clinica">Dra. Mariana — Six Fértile</h1>
      <div class="hdr-sub">Funil: leads → consulta → procedimento</div>
    </div>
  </div>
  <div class="hdr-right"><span class="badge-upd" id="badge-upd">—</span></div>
</header>

<div class="fbar" id="fbar" style="display:none">
  <span class="flbl">Mês</span>
  <div id="mespills" style="display:flex;gap:8px;flex-wrap:wrap"></div>
</div>

<main class="main" id="main">
  <div class="loading-wrap"><div class="spinner"></div><div style="color:var(--muted);font-weight:500">Carregando…</div></div>
</main>

<script>
const CONFIG={clinicaNome:'Dra. Mariana — Six Fértile'};
let DB=null, mesAtivo='todos', procFiltro='todos', charts={};
const MES_NOME={'2026-03':'Março','2026-04':'Abril','2026-05':'Maio','2026-06':'Junho'};
const PAL=['#214a4c','#2563eb','#d97706','#7c3aed','#dc2626','#0891b2'];

function fmtPct(a,b){ if(a==null||b==null||b===0) return '—'; return Math.round(a/b*100)+'%'; }

async function init(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    DB=await r.json();
  }catch(e){
    document.getElementById('main').innerHTML=
     '<div class="error-box"><h3>Não consegui carregar o data.json</h3><p>Confirme que <code>data.json</code> está no mesmo repositório/pasta do <code>index.html</code>.</p></div>';
    return;
  }
  document.getElementById('titulo-clinica').textContent=DB.clinica||CONFIG.clinicaNome;
  document.title='Dashboard – '+(DB.clinica||CONFIG.clinicaNome);
  document.getElementById('badge-upd').textContent='Atualizado '+(DB.ultimaAtualizacao||'');
  buildMesPills();
  render();
}

function buildMesPills(){
  document.getElementById('fbar').style.display='flex';
  const wrap=document.getElementById('mespills');
  const pills=[['todos','Todos']].concat(DB.meses.map(m=>[m,DB.mesesLabel[m]||m]));
  wrap.innerHTML=pills.map(([k,l])=>`<button class="pill ${k===mesAtivo?'active':''}" data-m="${k}">${l}</button>`).join('');
  wrap.querySelectorAll('.pill').forEach(b=>b.onclick=()=>{mesAtivo=b.dataset.m;buildMesPills();render();});
}

function funilDados(){
  if(mesAtivo==='todos') return {...DB.totais, label:'Todos os meses (Mar–Jun)'};
  const f=DB.funil[mesAtivo]; return {...f, label:MES_NOME[mesAtivo]+'/2026'};
}

function render(){
  const f=funilDados();
  const main=document.getElementById('main');
  main.innerHTML=`
  <div class="note">⚠️ <b>Coberturas diferentes:</b> leads sem março · procedimentos (Meire) sem junho · junho parcial (até 16/06). Funil 100% completo só em <b>abril</b> e <b>maio</b>. Perdidos contados pela <b>data de criação</b> do lead.</div>

  <div class="kg">
    <div class="kc"><div><div class="klbl">Leads que entram</div><div class="kval" style="color:var(--primary)">${f.entram??'—'}</div><div class="ksub">novos contatos no período<br><span style="color:var(--muted)">inclui spam/parceiros</span></div></div><div class="kico kb">↘</div></div>
    <div class="kc"><div><div class="klbl">Fecham consulta</div><div class="kval" style="color:var(--green)">${f.novas??'—'}</div><div class="ksub">consultas novas (todas TTO)<br>${fmtPct(f.novas,f.entram)} dos leads</div></div><div class="kico kt">✓</div></div>
    <div class="kc"><div><div class="klbl">Enviados à Meire</div><div class="kval" style="color:var(--blue)">${f.enviados??'—'}</div><div class="ksub">viraram caso de procedimento<br>${fmtPct(f.enviados,f.novas)} das novas</div></div><div class="kico ko">→</div></div>
    <div class="kc"><div><div class="klbl">Fecham procedimento</div><div class="kval" style="color:var(--amber)">${f.fecha??'—'}</div><div class="ksub">"Ganho" com a Meire<br>${fmtPct(f.fecha,f.enviados)} dos enviados</div></div><div class="kico kp">★</div></div>
  </div>

  <div class="row c2">
    <div class="cc">
      <div class="cct">Funil do período</div><div class="ccs">${f.label}</div>
      <div class="funnel" id="funnel"></div>
      <div class="fconv" id="fconv"></div>
    </div>
    <div class="cc">
      <div class="cct">Por que não fechou consulta</div><div class="ccs">Motivo de perda — todo o período (Mar–Jun)</div>
      <div class="cw h240"><canvas id="c-mot"></canvas></div>
    </div>
  </div>

  <div class="row c2">
    <div class="cc">
      <div class="cct">Leads perdidos por mês</div><div class="ccs">Pela data de criação do lead</div>
      <div class="cw h210"><canvas id="c-perd"></canvas></div>
    </div>
    <div class="cc">
      <div class="cct">Procedimentos (Meire) — situação</div><div class="ccs">Mar–Mai · ${DB.totais.enviados} casos enviados</div>
      <div class="cw h210"><canvas id="c-proc"></canvas></div>
    </div>
  </div>

  <div class="row c1">
    <div class="cc">
      <div class="cct">Procedimentos em aberto, atenção e perda — e o motivo</div>
      <div class="ccs">O que está travando cada caso enviado à Meire</div>
      <div class="pfilter" id="pfilter"></div>
      <div class="plist" id="plist"></div>
    </div>
  </div>`;

  drawFunnel(f);
  drawMotivos();
  drawPerdidos();
  drawProc();
  drawProcList();
}

function drawFunnel(f){
  const stages=[
    ['Entram',f.entram,'var(--primary)'],
    ['Fecham consulta',f.novas,'var(--green)'],
    ['Enviados à Meire',f.enviados,'var(--blue)'],
    ['Fecham procedimento',f.fecha,'var(--amber)']
  ];
  const base=stages.map(s=>s[1]).filter(v=>v!=null&&v>0);
  const max=base.length?Math.max(...base):1;
  document.getElementById('funnel').innerHTML=stages.map(([n,v,c])=>{
    const w=(v==null)?0:Math.max(4,Math.round(v/max*100));
    const txt=(v==null)?'sem dados':v;
    return `<div class="fr"><div class="fn">${n}</div><div class="ft"><div class="ff" style="width:${w}%;background:${c};${v==null?'opacity:.25;color:var(--muted)':''}">${v==null?'':v}</div></div><div class="fc">${v==null?'—':v}</div></div>`;
  }).join('');
  let conv='';
  if(f.entram&&f.novas) conv=`Lead→consulta ${fmtPct(f.novas,f.entram)} · `;
  if(f.novas&&f.enviados) conv+=`consulta→Meire ${fmtPct(f.enviados,f.novas)} · `;
  if(f.enviados&&f.fecha!=null) conv+=`Meire→fecha ${fmtPct(f.fecha,f.enviados)}`;
  document.getElementById('fconv').textContent=conv||'Funil completo só nos meses com as 4 pontas.';
}

function destroy(id){ if(charts[id]){charts[id].destroy(); delete charts[id];} }

function drawMotivos(){
  destroy('mot');
  const e=DB.perdidosMotivo, labels=Object.keys(e), data=Object.values(e);
  charts['mot']=new Chart(document.getElementById('c-mot'),{type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:PAL,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{position:'right',labels:{boxWidth:11,font:{size:11},padding:8}},
      tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw} (${Math.round(c.raw/data.reduce((a,b)=>a+b)*100)}%)`}}}}});
}
function drawPerdidos(){
  destroy('perd');
  const labels=DB.meses.map(m=>DB.mesesLabel[m]||m);
  const data=DB.meses.map(m=>DB.perdidosMes[m]??0);
  charts['perd']=new Chart(document.getElementById('c-perd'),{type:'bar',
    data:{labels,datasets:[{data,backgroundColor:'#214a4c',borderRadius:6,maxBarThickness:54}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw} leads perdidos`}}},
      scales:{y:{beginAtZero:true,grid:{color:'#f0f2f6'},ticks:{font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:11}}}}}});
}
function drawProc(){
  destroy('proc');
  const order=['Ganho','Em Aberto','Atenção','Perdido'];
  const col={'Ganho':'#059669','Em Aberto':'#214a4c','Atenção':'#d97706','Perdido':'#dc2626'};
  const labels=order.filter(s=>DB.procStatus[s]!=null);
  const data=labels.map(s=>DB.procStatus[s]);
  charts['proc']=new Chart(document.getElementById('c-proc'),{type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:labels.map(s=>col[s]),borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{position:'right',labels:{boxWidth:11,font:{size:11},padding:10}}}}});
}

const BDG={'Ganho':'bdg-g','Em Aberto':'bdg-b','Atenção':'bdg-o','Perdido':'bdg-r'};
function drawProcList(){
  const counts={todos:DB.procLista.length};
  DB.procLista.forEach(p=>counts[p.status]=(counts[p.status]||0)+1);
  const opts=[['todos','Todos']].concat(['Em Aberto','Atenção','Perdido','Ganho'].map(s=>[s,s]));
  document.getElementById('pfilter').innerHTML=opts.map(([k,l])=>
    `<button class="pf ${k===procFiltro?'active':''}" data-s="${k}">${l} ${counts[k]?`(${counts[k]})`:'(0)'}</button>`).join('');
  document.querySelectorAll('#pfilter .pf').forEach(b=>b.onclick=()=>{procFiltro=b.dataset.s;drawProcList();});
  const list=DB.procLista.filter(p=>procFiltro==='todos'||p.status===procFiltro);
  document.getElementById('plist').innerHTML=list.map(p=>`
    <div class="pcard">
      <div class="pcard-top"><span class="pname">${p.nome}</span><span class="bdg ${BDG[p.status]||'bdg-b'}">${p.status}</span></div>
      <div class="pmot">${p.motivo}</div>
      <div class="pmes">${p.mes}/2026</div>
    </div>`).join('') || '<div style="color:var(--muted2);font-size:.75rem;padding:8px">Nenhum caso neste filtro.</div>';
}

init();
</script>
</body>
</html>
